apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rentorbit-web
  namespace: ${KUBE_NAMESPACE}
  labels:
    app.kubernetes.io/name: rentorbit-web
    app.kubernetes.io/part-of: rentorbit
spec:
  ingressClassName: ${INGRESS_CLASS}
  rules:
    - host: ${INGRESS_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rentorbit-web
                port:
                  number: 3000
