apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentorbit-web
  namespace: ${KUBE_NAMESPACE}
  labels:
    app.kubernetes.io/name: rentorbit-web
    app.kubernetes.io/part-of: rentorbit
spec:
  replicas: ${WEB_REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: rentorbit-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rentorbit-web
        app.kubernetes.io/part-of: rentorbit
    spec:
      containers:
        - name: web
          image: ${WEB_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: rentorbit-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: rentorbit-config
                  key: WEB_PORT
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: rentorbit-config
                  key: NEXT_PUBLIC_API_URL
            - name: API_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: rentorbit-config
                  key: API_INTERNAL_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
